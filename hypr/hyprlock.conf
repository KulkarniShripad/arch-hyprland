# ===============================
# GENERAL
# ===============================
general {
    disable_loading_bar = true
    hide_cursor = true
    grace = 0
    no_fade_in = false
}

# ===============================
# BACKGROUND (FAST + BLUR)
# ===============================
background {
    monitor =
    path = ~/.cache/hyprlock_wallpaper.png
    blur_passes = 2
    blur_size = 6
    noise = 0.01
    contrast = 1.0
    brightness = 0.8
    vibrancy = 0.15
    vibrancy_darkness = 0.0
}

# ===============================
# FADE / ANIMATION
# ===============================
animation {
    enabled = true
    duration = 0.5
    easing = easeOutCubic
}

# ===============================
# CLOCK (time)
# ===============================
label {
    monitor =
    text = $TIME
    font_size = 64
    font_family = Fira Sans Semibold
    position = 0, 80
    halign = center
    valign = center
    color = rgba(255,255,255,1)
}

# ===============================
# DATE
# ===============================
label {
    monitor =
    text = cmd[update:60000] date "+%A, %d %B"
    font_size = 22
    font_family = Fira Sans Semibold
    position = 0, 20
    halign = center
    valign = center
    color = rgba(255,255,255,0.8)
}

# ===============================
# PASSWORD INPUT CIRCLE
# ===============================
input-field {
    monitor =
    size = 70, 70
    outline_thickness = 6
    dots_size = 0.25
    dots_spacing = 0.2
    dots_center = true

    position = 0, -100
    halign = center
    valign = center

    outer_color = rgba(255,255,255,1)
    inner_color = rgba(0,0,0,0.2)
    font_color = rgba(255,255,255,1)

    fade_on_empty = false
    rounding = -1
    check_color = rgba(0,255,0,1)
    fail_color = rgba(255,0,0,1)
}

